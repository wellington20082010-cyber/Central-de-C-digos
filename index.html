<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Central de Códigos</title>
</head>
<body>
  
  <div class="titulo">
    <h1>Central de Códigos</h1>
  </div>
  
  <div class="campos">
    <label for="Texto para codificar">Texto para codificar</label>
    <textarea name="Primeiro campo" id="campo1" rows="12" placeholder="Digite o texto aqui..."></textarea>
    <button type="submit">Codificar</button>
  </div>
  
  <div class="campos">
    <label for="Texto para decodificar">Texto para decodificar</label>
    <textarea name="Segundo campo" id="campo2" rows="12" placeholder="Digite o texto aqui..."></textarea>
    <button type="submit">Decodificar</button>
  </div>
  
  <script src="main.js"></script>
</body>
</html>
